services:
  # Backend API
  - type: web
    name: estilo-fino-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install && npm run build && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: estilo-fino-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: CLIENT_URL
        value: https://estilo-fino-web.onrender.com

  # Frontend Static Site
  - type: web
    name: estilo-fino-web
    runtime: static
    # ← QUITADO: plan (Static Sites no usan plan)
    # ← QUITADO: region (Static Sites no usan region)
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://estilo-fino-api.onrender.com/api

databases:
  - name: estilo-fino-db
    plan: free
    region: oregon